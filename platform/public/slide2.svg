<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="200" y="100" width="400" height="250" fill="#e0f2fe" stroke="#0284c7" stroke-width="6"/>
  <text x="400" y="380" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0369a1" text-anchor="middle">length = 6 cm</text>
  <text x="100" y="235" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0369a1" text-anchor="middle">width</text>
  <text x="100" y="265" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0369a1" text-anchor="middle">4 cm</text>
  <text x="400" y="180" font-family="sans-serif" font-size="32" font-weight="bold" fill="#0f766e" text-anchor="middle">Area = 6 × 4 = 24 cm²</text>
  <text x="400" y="250" font-family="sans-serif" font-size="32" font-weight="bold" fill="#6d28d9" text-anchor="middle">Perimeter = 2 × (6 + 4) = 20 cm</text>
</svg>
