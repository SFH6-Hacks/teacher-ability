<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <polygon points="400,80 150,320 650,320" fill="#fef08a" stroke="#ca8a04" stroke-width="6"/>
  <line x1="400" y1="80" x2="400" y2="320" stroke="#ca8a04" stroke-width="4" stroke-dasharray="8 8"/>
  <text x="380" y="220" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ca8a04" text-anchor="end">height = 5 cm</text>
  <text x="400" y="350" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ca8a04" text-anchor="middle">base = 8 cm</text>
  <text x="400" y="420" font-family="sans-serif" font-size="36" font-weight="bold" fill="#0f766e" text-anchor="middle">Area = ½ × 8 × 5 = 20 cm²</text>
</svg>
