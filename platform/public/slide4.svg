<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <circle cx="250" cy="225" r="150" fill="#fce7f3" stroke="#be185d" stroke-width="6"/>
  <circle cx="250" cy="225" r="6" fill="#be185d"/>
  <line x1="250" y1="225" x2="400" y2="225" stroke="#be185d" stroke-width="4"/>
  <text x="325" y="215" font-family="sans-serif" font-size="24" font-weight="bold" fill="#be185d" text-anchor="middle">r</text>
  
  <text x="600" y="160" font-family="sans-serif" font-size="32" font-weight="bold" fill="#0f766e" text-anchor="middle">Area = πr²</text>
  <text x="600" y="240" font-family="sans-serif" font-size="32" font-weight="bold" fill="#6d28d9" text-anchor="middle">Circumference = 2πr</text>
  <text x="600" y="320" font-family="sans-serif" font-size="24" font-weight="bold" fill="#be185d" text-anchor="middle">Diameter (d) = 2r</text>
</svg>
